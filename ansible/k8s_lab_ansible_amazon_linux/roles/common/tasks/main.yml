---
- name: Update system packages
  dnf:
    name: "*"
    state: latest

- name: Install required utilities
  dnf:
    name:
      - wget
      - git
      - tar
      - gzip
      - socat
      - conntrack
      - ipset
      - iptables
      - ebtables
      - device-mapper-persistent-data
      - lvm2
      - jq
      - ca-certificates
      - gnupg2
    state: present

- name: Set hostname on all nodes
  hostname:
    name: "{{ inventory_hostname }}"

- name: Disable swap
  command: swapoff -a
  ignore_errors: yes

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '(^.*swap.*$)'
    replace: '# \1'

- name: Install containerd
  dnf:
    name: containerd
    state: present

# 1️⃣ Ensure containerd config directory exists
- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'

# 2️⃣ Generate default containerd config
- name: Generate default containerd configuration
  command: containerd config default
  register: containerd_default_config

# 3️⃣ Write default config to /etc/containerd/config.toml
- name: Save containerd default config
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_default_config.stdout }}"
    mode: '0644'

- name: Ensure containerd config uses systemd cgroups
  lineinfile:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    line: 'SystemdCgroup = true'
  notify: Restart containerd

- name: Ensure containerd is running and enabled
  systemd:
    name: containerd
    enabled: yes
    state: started

# 1️⃣ Ensure br_netfilter module is loaded
- name: Load br_netfilter kernel module
  modprobe:
    name: br_netfilter
    state: present

# 2️⃣ Persist kernel module across reboots
- name: Ensure br_netfilter loads on boot
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      br_netfilter
    mode: '0644'

# 3️⃣ Configure sysctl for Kubernetes networking
- name: Ensure sysctl settings for Kubernetes
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
    mode: '0644'

# 4️⃣ Apply sysctl settings immediately
- name: Apply sysctl settings
  command: sysctl --system
  changed_when: false

# 4️⃣ Add Kubernetes dnf repository
- name: Add Kubernetes dnf repository
  copy:
    dest: /etc/yum.repos.d/kubernetes.repo
    content: |
      [kubernetes]
      name=Kubernetes
      baseurl=https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_minor_version }}/rpm/
      enabled=1
      gpgcheck=1
      gpgkey=https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_minor_version }}/rpm/repodata/repomd.xml.key
    mode: '0644'

- name: Import Kubernetes GPG key
  rpm_key:
    state: present
    key: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_minor_version }}/rpm/repodata/repomd.xml.key

# 5️⃣ Update all packages after repo is added
- name: Update all system packages (after repo)
  dnf:
    name: "*"
    state: latest
    update_cache: yes

- name: Install Kubernetes packages
  dnf:
    name:
      - kubelet-{{ kubernetes_version }}
      - kubeadm-{{ kubernetes_version }}
      - kubectl-{{ kubernetes_version }}
    state: present

- name: Install dnf versionlock plugin
  dnf:
    name: python3-dnf-plugin-versionlock
    state: present

- name: Lock Kubernetes packages
  command: dnf versionlock add kubelet kubeadm kubectl
  args:
    warn: false
  register: lock_result
  failed_when: false

- name: Enable kubelet service
  systemd:
    name: kubelet
    enabled: yes
    state: started