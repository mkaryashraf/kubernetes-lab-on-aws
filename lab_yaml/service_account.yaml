# Give a pod permission to list other pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vote-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vote-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps"]   # vote app only needs to read configmaps
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vote-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: vote-sa          # ← service account name
  namespace: default     # ← service account namespace
roleRef:
  kind: Role
  name: vote-role
  apiGroup: rbac.authorization.k8s.io


  # In your vote deployment, add serviceAccountName
#spec:
#  template:
#    spec:
#      serviceAccountName: vote-sa    # ← add this line
#      containers:
#      - name: vote
#        image: dockersamples/examplevotingapp_vote



